services:
  mongodb:
    image: mongo:7
    container_name: silverglow-mongodb-prod
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: silver-glow
    networks:
      - silverglow-network

  backend:
    build: ./server
    container_name: silverglow-backend-prod
    restart: unless-stopped
    ports:
      - "3131:3131"
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=3131
    depends_on:
      - mongodb
    networks:
      - silverglow-network

  frontend:
    build: ./client
    container_name: silverglow-frontend-prod
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://silverglow.store/api
    depends_on:
      - backend
    networks:
      - silverglow-network

networks:
  silverglow-network:
    driver: bridge

volumes:
  mongodb_data:
  uploads_data:
