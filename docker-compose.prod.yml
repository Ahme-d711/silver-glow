services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: silverglow-mongodb-prod
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: silver-glow
    networks:
      - silverglow-network

  # Backend API Service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: silverglow-backend-prod
    restart: unless-stopped
    ports:
      - "3131:3131"
    volumes:
      - uploads_data:/var/www/projects/silver-glow/server/uploads
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=3131
      - FRONTEND_URL=https://silverglow.store
      - COOKIE_DOMAIN=.silverglow.store
      - USE_HTTPS=true
      - COOKIE_HTTP_ONLY=true
      - DEFAULT_ADMIN_EMAIL=admin@admin.com
      - DEFAULT_ADMIN_PASSWORD=admin123
      - DEFAULT_ADMIN_PHONE=201018939831
      - DEFAULT_ADMIN_ADDRESS=123 Main St
      - DEFAULT_ADMIN_NAME=Super Admin
    depends_on:
      - mongodb
    networks:
      - silverglow-network

  # Frontend Service
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: silverglow-frontend-prod
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://silverglow.store/api
      - NEXT_PUBLIC_APP_URL=https://silverglow.store
    networks:
      - silverglow-network

networks:
  silverglow-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local
